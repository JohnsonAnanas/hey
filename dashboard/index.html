<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MERIDIAN · moniteur d'arbitrage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --abyss:#0A1014; --deep:#0E171C; --panel:#101E24; --line:#1B2E34;
  --haze:#7F979E; --ink:#C9DCE0; --edge:#EAF6F3;
  --trace:#4FD6C9; --warn:#F4B860; --ignite:#74E08A; --alert:#FF6B6B;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --disp:'Martian Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:
    radial-gradient(120% 80% at 50% -10%, #11242B 0%, var(--abyss) 60%) fixed,
    var(--abyss);
  color:var(--ink); font-family:var(--mono); font-size:14px; line-height:1.4;
  -webkit-font-smoothing:antialiased; padding:18px 22px 30px; max-width:1280px; margin:0 auto;
}
.eyebrow{font-family:var(--disp);font-weight:300;letter-spacing:.34em;text-transform:uppercase;
  font-size:10px;color:var(--haze)}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

/* ── top bar ── */
.top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;
  padding-bottom:14px;border-bottom:1px solid var(--line)}
.brand h1{font-family:var(--disp);font-weight:700;letter-spacing:.22em;font-size:22px;margin:2px 0 0}
.brand .sub{color:var(--haze);font-size:11px;letter-spacing:.04em}
.beat{display:flex;align-items:center;gap:20px;text-align:right}
.beat .blk{font-family:var(--disp);font-size:19px;color:var(--edge)}
.beat .blk small{display:block;font-size:9px;letter-spacing:.3em;color:var(--haze);font-weight:300}
.pulse{animation:pulse .9s ease-out}
@keyframes pulse{0%{color:var(--trace);text-shadow:0 0 14px var(--trace)}100%{color:var(--edge);text-shadow:none}}
.led{display:flex;align-items:center;gap:9px;padding:7px 12px;border:1px solid var(--line);
  border-radius:2px;background:#0C161B}
.led .dot{width:9px;height:9px;border-radius:50%;background:var(--haze);box-shadow:0 0 0 0 transparent}
.led.ok .dot{background:var(--ignite);box-shadow:0 0 10px var(--ignite)}
.led.warn .dot{background:var(--warn);box-shadow:0 0 10px var(--warn)}
.led.bad .dot{background:var(--alert);box-shadow:0 0 10px var(--alert)}
.led .txt b{color:var(--ink);font-weight:600}
.led .txt span{display:block;font-size:10px;color:var(--haze)}

/* ── hero / the edge ── */
.hero{position:relative;margin-top:18px}
.hero .cap{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.hero .cap .edgelbl{font-family:var(--disp);letter-spacing:.3em;font-size:10px;color:var(--edge)}
.hero .cap .hint{font-size:10px;color:var(--haze)}
#field{display:block;width:100%;height:340px;border:1px solid var(--line);
  border-radius:3px;background:linear-gradient(180deg,#0D1B21 0%,#0A1216 100%)}
.depths{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.depth{flex:1 1 150px;border:1px solid var(--line);border-radius:3px;background:var(--panel);
  padding:11px 13px;position:relative;overflow:hidden}
.depth .sy{font-family:var(--disp);font-weight:500;letter-spacing:.1em;font-size:13px}
.depth .bps{font-family:var(--disp);font-weight:700;font-size:26px;margin:2px 0 1px;line-height:1}
.depth .meta{font-size:10px;color:var(--haze)}
.depth .basis{position:absolute;top:9px;right:10px;font-size:8.5px;letter-spacing:.12em;
  color:var(--warn);border:1px solid var(--warn);border-radius:2px;padding:1px 4px;opacity:.8}

/* ── grid ── */
.grid{display:grid;grid-template-columns:1.05fr 1fr;gap:14px;margin-top:18px}
.card{border:1px solid var(--line);border-radius:3px;background:var(--deep)}
.card h2{font-family:var(--disp);font-weight:500;letter-spacing:.24em;text-transform:uppercase;
  font-size:10px;color:var(--haze);margin:0;padding:13px 15px 9px;border-bottom:1px solid var(--line)}
.vrows{padding:6px 6px 10px}
.vasset{padding:8px 9px 4px}
.vasset .nm{font-family:var(--disp);font-size:11px;letter-spacing:.08em;color:var(--ink)}
.vrow{display:grid;grid-template-columns:78px 56px 1fr;align-items:center;gap:10px;
  padding:4px 9px;font-size:12px}
.vrow .v{color:var(--haze)}
.vrow.best .v{color:var(--ink)}
.vrow .n{text-align:right}
.bar{height:6px;border-radius:3px;background:#0C171C;overflow:hidden;position:relative}
.bar i{position:absolute;left:0;top:0;bottom:0;border-radius:3px}

.feed{max-height:430px;overflow:auto;padding:4px 0 8px}
.ev{display:grid;grid-template-columns:48px 1fr;gap:10px;padding:8px 15px;border-left:2px solid var(--line);
  margin:1px 0;font-size:12px}
.ev time{color:var(--haze);font-size:11px}
.ev.peak{border-left-color:var(--trace)}
.ev.hot{border-left-color:var(--warn)}
.ev.live{border-left-color:var(--ignite);background:rgba(116,224,138,.06)}
.ev.vol{border-left-color:#5B7682}
.ev.guard{border-left-color:var(--alert);background:rgba(255,107,107,.05)}
.ev .k{font-family:var(--disp);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--haze)}
.feed .empty{padding:24px 16px;color:var(--haze);font-size:12px}

/* ── footer ── */
.foot{display:flex;flex-wrap:wrap;gap:26px;margin-top:18px;padding-top:13px;
  border-top:1px solid var(--line);align-items:baseline}
.stat .v{font-family:var(--disp);font-size:17px;color:var(--edge)}
.stat .l{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--haze)}
.foot .note{margin-left:auto;font-size:10px;color:var(--haze);max-width:340px;text-align:right}

@media(max-width:820px){.grid{grid-template-columns:1fr}.beat{gap:12px}}
@media(prefers-reduced-motion:reduce){.pulse{animation:none}}
</style>
</head>
<body>
<header class="top">
  <div class="brand">
    <div class="eyebrow">Base · Binance — moniteur de signal</div>
    <h1>MERIDIAN</h1>
    <div class="sub">on observe le gap remonter vers le seuil. on n'exécute rien.</div>
  </div>
  <div class="beat">
    <div class="led" id="led"><div class="dot"></div>
      <div class="txt"><b id="ledTxt">donnée</b><span id="ledSub">en attente…</span></div></div>
    <div class="blk num"><span id="blk">—</span><small>bloc base</small></div>
  </div>
</header>

<section class="hero">
  <div class="cap"><span class="edgelbl">— THE EDGE · gap net 0 bps —</span>
    <span class="hint">chaque actif remonte des profondeurs ; il s'embrase au seuil</span></div>
  <canvas id="field"></canvas>
  <div class="depths" id="depths"></div>
</section>

<section class="grid">
  <div class="card"><h2>répartition par venue</h2><div class="vrows" id="venues"></div></div>
  <div class="card"><h2>moments forts</h2><div class="feed" id="feed"></div></div>
</section>

<footer class="foot" id="foot"></footer>

<script>
const $=id=>document.getElementById(id);
const F=(n,d=1)=> (n==null||isNaN(n))?'—':(n>=0?'+':'')+n.toFixed(d);
function hx(h){h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]}
function mix(a,b,t){const A=hx(a),B=hx(b);return`rgb(${A.map((x,i)=>Math.round(x+(B[i]-x)*t)).join(',')})`}
const COL={trace:'#4FD6C9',warn:'#F4B860',ignite:'#74E08A',far:'#3E8C86'};
function netColor(net){
  if(net>0) return COL.ignite;
  const d=-net;
  if(d>=20) return COL.far;
  if(d>=5)  return mix(COL.warn,COL.trace,(d-5)/15);   // d=20→teal, d=5→amber
  return mix(COL.warn,COL.ignite,(5-d)/5);             // d=5→amber, d=0→green
}

let lastBlock=null, prevFloors=[];
async function tick(){
  let s; try{ s=await (await fetch('/api/state',{cache:'no-store'})).json(); }catch(e){ return; }
  if(s.waiting||!s.top){ $('ledSub').textContent='en attente du collecteur…'; return; }
  renderTop(s); renderDepths(s); drawField(s.assets); renderVenues(s.assets); renderFeed(s.events); renderFoot(s);
}
function renderTop(s){
  const t=s.top, blk=$('blk');
  if(t.block!==lastBlock){ blk.classList.remove('pulse'); void blk.offsetWidth; blk.classList.add('pulse'); lastBlock=t.block; }
  blk.textContent=t.block.toLocaleString('fr');
  const age=t.block_age_s ?? 0, quorum=t.n_sources||0;
  const ok = t.fresh_ok && quorum>=2 && age<30;
  const led=$('led'); led.className='led '+(ok?'ok':(quorum>=1&&age<90?'warn':'bad'));
  $('ledTxt').textContent = ok?'donnée fiable':'donnée dégradée';
  $('ledSub').textContent = `quorum ${quorum} · bloc il y a ${age}s`;
}
function renderDepths(s){
  $('depths').innerHTML = s.assets.map(a=>{
    const net=a.current?a.current.net:null, c=net==null?'var(--haze)':netColor(net);
    return `<div class="depth">${a.basis?'<span class="basis">basis usdt</span>':''}
      <div class="sy">${a.sym}</div>
      <div class="bps num" style="color:${c}">${F(net)}<span style="font-size:11px;color:var(--haze)"> bps</span></div>
      <div class="meta">via ${a.current?a.current.venue:'—'} · vs ${a.binance}</div></div>`;
  }).join('') || '<div class="depth"><div class="meta">en attente de données…</div></div>';
}
function renderVenues(assets){
  $('venues').innerHTML = assets.map(a=>`
    <div class="vasset"><div class="nm">${a.sym} <span style="color:var(--haze)">· ${a.binance}</span></div></div>
    `+a.venues.map((v,i)=>{
      const c=netColor(v.net), w=Math.max(3,Math.min(100,(40+v.net)/40*100)); // -40→3% .. 0→100%
      return `<div class="vrow ${i===0?'best':''}">
        <span class="v">${v.venue} <small style="color:var(--haze)">${v.fee_bps}b</small></span>
        <span class="n num" style="color:${c}">${F(v.net)}</span>
        <span class="bar"><i style="width:${w}%;background:${c};opacity:${i===0?.95:.5}"></i></span></div>`;
    }).join('')
  ).join('') || '<div class="feed empty">en attente…</div>';
}
const KIND={peak:'plus proche',hot:'approche',live:'franchi',vol:'volatilité',guard:'intégrité'};
function renderFeed(ev){
  $('feed').innerHTML = (ev&&ev.length)? ev.map(e=>`
    <div class="ev ${e.kind}"><time>${(e.ts||'').slice(0,8)}</time>
      <div><span class="k">${KIND[e.kind]||e.kind}</span><br>${e.text}</div></div>`).join('')
    : '<div class="empty">le marché est calme. aucun moment fort pour l\'instant — c\'est normal, le signal vit dans la volatilité.</div>';
}
function renderFoot(s){
  const x=s.session;
  const cells=[['blocs observés',x.n_blocks],['% actionnable',x.pct_actionable+'%'],
    ['meilleur gap',F(x.best_net)+' bps'],['persistance max',x.persist_max+' blocs'],['abstentions',x.n_abstain]];
  $('foot').innerHTML = cells.map(([l,v])=>`<div class="stat"><div class="v num">${v}</div><div class="l">${l}</div></div>`).join('')
    + `<div class="note">net = après frais DEX+CEX (taker 10 bps). non atomique : un gap > 0 reste à valider (inventaire, exécution).</div>`;
}

/* ── THE EDGE : canvas ── */
const cv=$('field'), ctx=cv.getContext('2d');
function fit(){const r=cv.getBoundingClientRect(),dpr=Math.min(2,devicePixelRatio||1);
  cv.width=r.width*dpr;cv.height=r.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);return r;}
function drawField(assets){
  const r=fit(), W=r.width, H=r.height, padL=46, padR=14, padT=20, padB=16;
  ctx.clearRect(0,0,W,H);
  let floor=-40;
  assets.forEach(a=>a.series.forEach(n=>{if(n<floor)floor=n;}));
  floor=Math.min(-12,Math.floor(floor/10)*10-2); const ceil=2;
  const Y=net=> padT + (ceil-net)/(ceil-floor)*(H-padT-padB);
  // grid + bps labels
  ctx.font='10px IBM Plex Mono'; ctx.textBaseline='middle';
  for(let b=0;b>=floor;b-=10){
    const y=Y(b); ctx.strokeStyle='rgba(124,151,158,.12)'; ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();
    ctx.fillStyle='#5E767D';ctx.textAlign='right';ctx.fillText(b+'',padL-8,y);
  }
  // the edge line (0 bps)
  const ye=Y(0);
  const g=ctx.createLinearGradient(0,ye-9,0,ye+9);
  g.addColorStop(0,'rgba(234,246,243,0)');g.addColorStop(.5,'rgba(234,246,243,.16)');g.addColorStop(1,'rgba(234,246,243,0)');
  ctx.fillStyle=g; ctx.fillRect(padL,ye-9,W-padL-padR,18);
  ctx.strokeStyle='#EAF6F3';ctx.lineWidth=1.3;ctx.setLineDash([7,6]);
  ctx.beginPath();ctx.moveTo(padL,ye);ctx.lineTo(W-padR,ye);ctx.stroke();ctx.setLineDash([]);
  // traces
  assets.forEach(a=>{
    const s=a.series; if(!s||!s.length) return;
    const n=s.length, x=i=> padL + (n===1?1:i/(n-1))*(W-padL-padR);
    const cur=s[n-1], col=netColor(cur);
    ctx.lineWidth=2; ctx.strokeStyle=col; ctx.lineJoin='round';
    if(-cur<6){ctx.shadowColor=col;ctx.shadowBlur=12;} else {ctx.shadowBlur=0;}
    ctx.beginPath();
    s.forEach((net,i)=>{const X=x(i),YY=Y(net); i?ctx.lineTo(X,YY):ctx.moveTo(X,YY);});
    ctx.stroke(); ctx.shadowBlur=0;
    // head dot + label
    const hx2=x(n-1), hy=Y(cur);
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(hx2,hy,3.4,0,7);ctx.fill();
    ctx.font='600 11px Martian Mono';ctx.textAlign='right';ctx.textBaseline='bottom';
    ctx.fillStyle=col;ctx.fillText(`${a.sym} ${F(cur)}`,hx2-7,hy-5);
  });
}
window.addEventListener('resize',()=>{ /* redraw next tick */ });
tick(); setInterval(tick,2500);
</script>
</body>
</html>
